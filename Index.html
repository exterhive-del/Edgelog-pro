<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--cyan:#00d4ff;--cyan2:#00a8cc;--cyd:rgba(0,212,255,0.1);--g:#00e5a0;--g2:#00b87a;--gd:rgba(0,229,160,0.1);--r:#ff4060;--rd:rgba(255,64,96,0.1);--a:#ffb020;--ad:rgba(255,176,32,0.1);--b:#4da6ff;--bd:rgba(77,166,255,0.1);--p:#a78bfa;--pd:rgba(167,139,250,0.1);--font:'Inter',sans-serif;--mono:'DM Mono',monospace;--nh:62px;--th:54px}
[data-theme="dark"]{--bg:#080b10;--bg2:#0f1319;--bg3:#161c26;--bg4:#1c2332;--bg5:#222a3a;--bd1:rgba(255,255,255,0.06);--bd2:rgba(255,255,255,0.12);--tx:#e4eaf5;--tx2:#7d8aaa;--tx3:#404c66}
[data-theme="light"]{--bg:#f0f2f8;--bg2:#ffffff;--bg3:#f5f6fb;--bg4:#eceff7;--bg5:#e2e6f0;--bd1:rgba(0,0,0,0.07);--bd2:rgba(0,0,0,0.13);--tx:#0d1420;--tx2:#5a6680;--tx3:#9aa0b8;--g:#00a873;--g2:#008f61;--gd:rgba(0,168,115,0.1);--r:#e0003a;--rd:rgba(224,0,58,0.1)}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:var(--font);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;overflow:hidden}
#app{display:flex;height:100vh;width:100vw}
#sb{width:230px;min-width:230px;background:var(--bg2);border-right:1px solid var(--bd1);display:flex;flex-direction:column;flex-shrink:0}
.logo{padding:18px 18px 14px;border-bottom:1px solid var(--bd1);display:flex;align-items:center;justify-content:space-between}
.logo-name{font-size:20px;font-weight:800;letter-spacing:-0.5px;background:linear-gradient(135deg,var(--g),var(--b));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.logo-tag{font-size:9px;color:var(--tx3);letter-spacing:2px;text-transform:uppercase;margin-top:1px}
.theme-btn{background:var(--bg3);border:1px solid var(--bd2);border-radius:8px;padding:6px 9px;cursor:pointer;font-size:15px;line-height:1;color:var(--tx2)}
.nav{flex:1;padding:10px 8px;overflow-y:auto;display:flex;flex-direction:column;gap:1px}
.nsec{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--tx3);padding:10px 10px 3px;font-weight:600}
.nb{display:flex;align-items:center;gap:10px;width:100%;padding:9px 12px;border:none;border-radius:8px;background:none;color:var(--tx2);font-family:var(--font);font-size:13px;font-weight:500;cursor:pointer;text-align:left;transition:all .15s;position:relative}
.nb:hover{background:var(--bg3);color:var(--tx)}
.nb.act{background:var(--gd);color:var(--g);font-weight:600}
.nb.act::before{content:'';position:absolute;left:0;top:22%;bottom:22%;width:3px;background:var(--g);border-radius:3px}
.nb .ico{font-size:16px;width:19px;text-align:center;flex-shrink:0}
.ndiv{height:1px;background:var(--bd1);margin:6px 8px}
.sb-bot{padding:12px;border-top:1px solid var(--bd1)}
.tcard{background:var(--bg3);border:1px solid var(--bd2);border-radius:12px;padding:13px 15px}
.tlbl{font-size:9px;color:var(--tx3);letter-spacing:1.5px;text-transform:uppercase;font-weight:600}
.tpnl{font-size:24px;font-weight:800;color:var(--g);margin-top:2px;letter-spacing:-1px}
.tsub{font-size:11px;color:var(--tx3);margin-top:1px}
#main{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}
.page{display:none;flex-direction:column;height:100%}
.page.vis{display:flex}
.topbar{height:var(--th);padding:0 20px;border-bottom:1px solid var(--bd1);background:var(--bg2);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:10px}
.ptitle{font-size:17px;font-weight:800;letter-spacing:-.5px}
.tacts{display:flex;gap:7px;align-items:center;flex-shrink:0;flex-wrap:wrap}
.pbody{flex:1;overflow-y:auto;padding:18px 20px;padding-bottom:calc(18px + var(--nh))}
.btn{padding:7px 14px;border-radius:8px;border:1px solid var(--bd2);background:var(--bg3);color:var(--tx2);cursor:pointer;font-family:var(--font);font-size:13px;font-weight:500;transition:all .15s;white-space:nowrap;display:inline-flex;align-items:center;gap:6px}
.btn:hover{border-color:rgba(255,255,255,.2);color:var(--tx)}
.btnp{background:var(--g);color:#000;border-color:var(--g);font-weight:700}
.btnp:hover{background:var(--g2);border-color:var(--g2);color:#000}
.btnd{color:var(--r);border-color:rgba(255,64,96,.28);background:var(--rd)}
.btnsm{padding:4px 9px;font-size:11px}
.grid{display:grid;gap:13px}
.g2{grid-template-columns:repeat(2,1fr)}.g3{grid-template-columns:repeat(3,1fr)}.g4{grid-template-columns:repeat(4,1fr)}
.mt12{margin-top:12px}.mt16{margin-top:16px}
.card{background:var(--bg2);border:1px solid var(--bd1);border-radius:12px;padding:18px}
.clbl{font-size:9px;color:var(--tx3);letter-spacing:1.5px;text-transform:uppercase;font-weight:600;margin-bottom:11px}
.ctitle{font-size:15px;font-weight:700;margin-bottom:11px}
.sc{background:var(--bg2);border:1px solid var(--bd1);border-radius:12px;padding:14px 16px;position:relative;overflow:hidden}
.sc::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--scc,var(--g));border-radius:3px 3px 0 0}
.slbl{font-size:9px;color:var(--tx3);letter-spacing:1.5px;text-transform:uppercase;font-weight:600;margin-bottom:5px}
.sval{font-size:22px;font-weight:800;letter-spacing:-.5px;line-height:1}
.ssub{font-size:11px;color:var(--tx3);margin-top:4px}
.cg{color:var(--g)}.cr{color:var(--r)}.ca{color:var(--a)}.cb{color:var(--b)}.cp{color:var(--p)}
.tw{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;min-width:500px}
thead th{text-align:left;padding:8px 9px;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--tx3);border-bottom:1px solid var(--bd1);white-space:nowrap;font-weight:600}
tbody tr{cursor:pointer;transition:background .1s}
tbody tr:hover td{background:var(--bg3)}
tbody td{padding:10px 9px;border-bottom:1px solid var(--bd1);font-size:12px;vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
.bdg{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700}
.bl{background:var(--gd);color:var(--g)}.bs{background:var(--rd);color:var(--r)}
.bw{background:var(--gd);color:var(--g)}.bloss{background:var(--rd);color:var(--r)}.bbe{background:var(--ad);color:var(--a)}
.form{display:flex;flex-direction:column;gap:11px}
.frow{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:11px}
.field{display:flex;flex-direction:column;gap:4px}
.field label{font-size:9px;letter-spacing:.5px;color:var(--tx3);font-weight:600;text-transform:uppercase}
.field input,.field select,.field textarea{background:var(--bg3);border:1px solid var(--bd2);border-radius:8px;padding:9px 12px;color:var(--tx);font-family:var(--font);font-size:13px;outline:none;width:100%;transition:border .15s;-webkit-appearance:none}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--g);background:var(--bg4)}
.field textarea{resize:vertical;min-height:72px;line-height:1.5}
select option{background:var(--bg3)}
.chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:3px}
.chip{padding:4px 11px;border-radius:20px;border:1px solid var(--bd2);font-size:11px;color:var(--tx2);cursor:pointer;transition:all .15s;user-select:none;font-weight:500}
.chip:hover,.chip.act{border-color:var(--g);color:var(--g);background:var(--gd)}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:999;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s;backdrop-filter:blur(6px)}
.overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--bg2);border:1px solid var(--bd2);border-radius:20px 20px 0 0;padding:22px 20px 30px;width:100%;max-width:700px;max-height:92vh;overflow-y:auto;transform:translateY(40px);transition:transform .25s}
.overlay.open .modal{transform:translateY(0)}
.mhdl{width:38px;height:4px;background:var(--bg5);border-radius:2px;margin:0 auto 18px}
.mhdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.mtitle{font-size:17px;font-weight:800}
.xbtn{background:var(--bg3);border:none;color:var(--tx2);cursor:pointer;font-size:17px;padding:5px 9px;border-radius:8px;line-height:1}
.xbtn:hover{background:var(--bg4);color:var(--tx)}
.ch{position:relative;height:180px}.chl{position:relative;height:250px}
.ir{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--bd1);font-size:12px}
.ir:last-child{border-bottom:none}
.irl{color:var(--tx3);font-size:11px;font-weight:500}.irv{font-weight:700}
.cal-hdr{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:5px}
.cal-dh{text-align:center;font-size:9px;color:var(--tx3);font-weight:600;letter-spacing:1px;text-transform:uppercase;padding:4px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-day{min-height:52px;border-radius:8px;border:1px solid var(--bd1);padding:5px 7px;font-size:11px;cursor:pointer;transition:all .15s;background:var(--bg3)}
.cal-day:hover{border-color:var(--bd2)}
.cal-day.win{border-color:rgba(0,229,160,.4);background:rgba(0,229,160,.06)}
.cal-day.loss{border-color:rgba(255,64,96,.4);background:rgba(255,64,96,.06)}
.cal-day.today{border-color:var(--b);box-shadow:0 0 0 1px var(--b)}
.cal-day.empty{background:transparent;border-color:transparent;cursor:default;pointer-events:none}
.cal-date{font-weight:700;color:var(--tx3);font-size:10px}
.cal-pnl{font-size:11px;font-weight:800;margin-top:2px}
.cal-cnt{font-size:9px;color:var(--tx3)}
.nb-entry{background:var(--bg3);border:1px solid var(--bd1);border-radius:10px;padding:14px;margin-bottom:10px;cursor:pointer;transition:border-color .15s}
.nb-entry:hover{border-color:var(--bd2)}
.nb-date{font-size:11px;color:var(--tx3);font-weight:600;margin-bottom:4px}
.nb-prev{font-size:13px;color:var(--tx2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tilt-bar{height:10px;border-radius:5px;background:var(--bg4);overflow:hidden;margin-top:5px}
.tilt-fill{height:100%;border-radius:5px;transition:width .5s}
.pbgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:12px}
.pbc{background:var(--bg2);border:1px solid var(--bd1);border-radius:12px;padding:16px;cursor:pointer;transition:all .15s}
.pbc:hover{border-color:var(--g);transform:translateY(-2px)}
.pb-name{font-size:15px;font-weight:700;margin-bottom:5px}
.tag{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;background:var(--pd);color:var(--p);border:1px solid rgba(167,139,250,.2);margin-right:4px;font-weight:600}
.csec{background:var(--bg2);border:1px solid var(--bd1);border-radius:12px;padding:15px}
.cres{background:var(--bg);border:1px solid rgba(0,229,160,.15);border-radius:10px;padding:11px;margin-top:11px}
.crow{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--bd1)}
.crow:last-child{border-bottom:none}
.clb{font-size:11px;color:var(--tx3);font-weight:500}.cv{font-size:14px;font-weight:700}
.sgallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:10px}
.sthumb{position:relative;border-radius:10px;overflow:hidden;aspect-ratio:16/9;cursor:pointer;border:1px solid var(--bd1);transition:all .15s}
.sthumb:hover{border-color:var(--g);transform:scale(1.02)}
.sthumb img{width:100%;height:100%;object-fit:cover}
.sthumb-lbl{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.78);padding:5px 8px;font-size:10px;font-weight:600}
.acc-chip{padding:5px 13px;border-radius:20px;border:1px solid var(--bd2);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;color:var(--tx2);background:none}
.acc-chip.act{background:var(--gd);border-color:var(--g);color:var(--g)}
#bnav{display:none;position:fixed;bottom:0;left:0;right:0;height:var(--nh);background:var(--bg2);border-top:1px solid var(--bd1);align-items:stretch;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
.bnb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;border:none;background:none;color:var(--tx3);cursor:pointer;font-family:var(--font);font-size:9px;font-weight:600;letter-spacing:.3px;padding:5px 2px;transition:color .15s;text-transform:uppercase}
.bnb .ico{font-size:18px;line-height:1}
.bnb.act{color:var(--g)}
.mmi{display:flex;align-items:center;gap:11px;padding:10px 13px;border-radius:9px;border:none;background:none;color:var(--tx2);cursor:pointer;font-family:var(--font);font-size:13px;font-weight:500;width:100%;text-align:left;transition:all .15s}
.mmi:hover,.mmi.act{background:var(--gd);color:var(--g)}
.mmi .ico{font-size:17px;width:20px;text-align:center}
#fab{display:none;position:fixed;bottom:calc(var(--nh) + 13px);right:17px;width:52px;height:52px;border-radius:50%;background:var(--g);color:#000;border:none;font-size:25px;font-weight:700;cursor:pointer;z-index:150;box-shadow:0 4px 20px rgba(0,229,160,.4);align-items:center;justify-content:center;transition:transform .15s}
#fab:active{transform:scale(.93)}
#shot-area:hover{border-color:var(--g)}
#shot-area.dragover{border-color:var(--g);background:var(--gd)}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:768px){#sb{display:none}#bnav{display:flex}#fab{display:flex}.g4{grid-template-columns:repeat(2,1fr)}.g3{grid-template-columns:repeat(2,1fr)}.g2{grid-template-columns:1fr}.topbar{padding:0 14px}.pbody{padding:13px 13px calc(13px + var(--nh))}.ptitle{font-size:16px}.pbgrid{grid-template-columns:1fr}.sgallery{grid-template-columns:repeat(auto-fill,minmax(140px,1fr))}}
@media(max-width:480px){.g4{grid-template-columns:repeat(2,1fr)}.g3{grid-template-columns:1fr}.frow{grid-template-columns:1fr}}
[data-theme="light"] .card,[data-theme="light"] .sc,[data-theme="light"] .csec,[data-theme="light"] .modal{box-shadow:0 2px 10px rgba(0,0,0,.06)}
[data-theme="light"] .tcard{background:linear-gradient(135deg,#f0fdf8,#e8f4ff);border-color:rgba(0,168,115,.2)}
[data-theme="light"] select option{background:#fff;color:#0d1420}
.hid{display:none!important}
.flex{display:flex}.aic{align-items:center}.g8{gap:8px}.w100{width:100%}.tr{text-align:right}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-thumb{background:var(--bg5);border-radius:2px}

.dnb{display:flex;align-items:center;gap:10px;width:100%;padding:10px 13px;border:none;border-radius:9px;background:none;color:var(--tx2);font-family:var(--font);font-size:13px;font-weight:500;cursor:pointer;text-align:left;transition:all .15s;position:relative}
.dnb:hover{background:var(--bg3);color:var(--tx)}
.dnb.act{background:rgba(0,212,255,0.1);color:#00d4ff;font-weight:600}
.dnb.act::before{content:\'\';position:absolute;left:0;top:22%;bottom:22%;width:3px;background:#00d4ff;border-radius:3px}
@keyframes shimmer{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}

</style>
